project_name: rccv   # regime-calibrated conformal volatility (working codename)
seed: 42

data:
  raw_path: data/raw
  processed_path: data/processed_v2      # v2 panel; legacy RIVE parquets live in data/processed (untouched)
  start_date: '2005-01-03'
  end_date: '2025-12-31'
  universe:
    kind: crsp_top_marketcap_pit          # CRSP point-in-time top-100, annual rebalance (scripts/build_pit_universe.py); dev fallback: provisional_top100
    size: 100
  rv:
    source: risklab                       # -> wrds_taq once WRDS access lands
    estimator: log_rv5                    # 5-min trades RV (log daily variance); alt: log_rv (QMLE)
    sampling_minutes: 5
    subsample: true

state_vars:
  # DBAA/DAAA = daily Moody's yields -> credit_spread. BAMLH0A0HYM2 (HY OAS) is
  # excluded by default: keyless fredgraph caps it at ~3y of history and it is
  # largely redundant with the Moody's spread; add it back if FRED_API_KEY is set.
  fred_series: [VIXCLS, DGS10, DGS3MO, DBAA, DAAA]
  percentile_window_days: 750

evaluation:
  burn_in_end: '2009-12-31'
  online_eval_start: '2010-01-01'
  alpha_two_sided: 0.10
  alpha_one_sided: [0.01, 0.05]
  refit_frequency: quarterly

regimes:
  estimator: online_hmm                   # ablation: quantile_bins
  n_regimes: 3                            # ablation: 2..5

mlflow:
  experiment_name: rccv_panel
